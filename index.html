<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    AC Shared Electricity Tracker
  </title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="container">

    <h1>
      ❄️ AC Shared Electricity Tracker
    </h1>

    <div class="card">

      <h2>Active Users</h2>

      <div id="activeUsers"></div>

    </div>

    <div class="card">

      <select id="userSelect">

        <option>Partha</option>
        <option>Suman</option>
        <option>Soumyadeep</option>
        <option>Joy</option>
        <option>Mahadev</option>
        <option>Mallinath</option>
        <option>Anik</option>
        
      </select>

      <input
        type="number"
        id="meterReading"
        placeholder="Current Meter Reading"
      />

      <div class="buttons">

        <button id="joinBtn">
          JOIN
        </button>

        <button id="exitBtn">
          EXIT
        </button>

      </div>

    </div>

    <div class="card">

      <h2>Monthly Summary</h2>

      <div id="summary"></div>

    </div>

  </div>

  <script src="config.js"></script>

  <script src="app.js"></script>

</body>
</html>
